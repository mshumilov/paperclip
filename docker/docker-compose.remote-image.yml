# Pre-built image only (no build context). Used by scripts/deploy-docker-remote.sh:
# build locally → docker save → upload → docker load → compose up.
services:
  paperclip:
    image: ${PAPERCLIP_IMAGE:-paperclip:remote}
    # Match typical Linux VPS (x86_64); build with: docker build --platform linux/amd64 …
    platform: linux/amd64
    pull_policy: never
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${PAPERCLIP_DATA_DIR:?PAPERCLIP_DATA_DIR must be set to an absolute path on the server}:/paperclip"
